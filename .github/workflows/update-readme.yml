name: Update README Table

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Read existing table (optional)
        run: |
          set +e
          existing_table=$(grep -E '^<h2>Templates|<table>|</table>$' README.md)
          if [[ ! -z "$existing_table" ]]; then
            echo "Existing table found. Updating..."
          else
            echo "No existing table found. Creating new table..."
          fi

      - name: Generate new table content
        run: |
          files=$(find ./templates -type f)
          content=""
          for file in $files; do
            file_name=$(basename "$file")
            link="https://snbig.github.io/Vulnerable-Pages/templates/$file_name"
            content+="<li><a href=\"$link\" style=\"display: inline-block; padding: 10px 20px; margin: 5px; background-color: #3f51b5; color: white; text-decoration: none; font-size: 16px; border-radius: 5px;\">$file_name</a></li>"
          done
          echo "$content" > table_content.txt

      - name: Update README
        run: |
          if [[ -z "$existing_table" ]]; then
            echo "<div class=\"templates-container\" style=\"margin: 0 auto; text-align: center;\">" > README.md
            echo "<h1 style='color: #4CAF50;' align=\"center\">Templates</h1>" >> README.md
            echo "<ul class=\"templates-list\" style=\"list-style: none; padding: 0;\">" >> README.md
            cat table_content.txt >> README.md
            echo "</ul>" >> README.md
            echo "</div>" >> README.md
          else
            sed -i '/<h2>Templates/,/<\/table>/d' README.md
            echo "<h2 style='color: #4CAF50;'>Templates</h2>" >> README.md
            echo "<table style='border-collapse: collapse; width: 100%;'>" >> README.md
            echo "<tr style='background-color: #f2f2f2;'><th style='border: 1px solid #ddd; padding: 8px;'>File Name</th><th style='border: 1px solid #ddd; padding: 8px;'>Link</th></tr>" >> README.md
            cat table_content.txt >> README.md
            echo "</table>" >> README.md
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update README table
          commit_user_name: GitHub Actions
          commit_user_email: github-actions[bot]@users.noreply.github.com
          branch: main  # Replace with your desired branch
          file_pattern: README.md
