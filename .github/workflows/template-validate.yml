name: ☑️ Update README with Template Files

on:
  push:
    branches:
      - main
    paths:
      - 'templates/**/*.yaml'
  pull_request:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: github.repository == 'OWASP/www-project-asvs-security-evaluation-templates-with-nuclei'  # Adjust repository name as necessary
    steps:
      # Checkout the repository
      - uses: actions/checkout@v2

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install PyYAML

      # Run Python script to find template files and update README
      - name: Find matching template files and update README
        run: |
          python3 <<EOF
import os
import re

# Regex pattern to match template files
pattern = re.compile(r'.*/[0-9]+\.[0-9]+\.[0-9]+(\.[0-9])?\.yaml')

# Directory where templates are stored
template_dir = 'templates/'

# Find all files matching the regex
matching_files = []
for root, dirs, files in os.walk(template_dir):
    for file in files:
        if pattern.match(file):
            matching_files.append(os.path.relpath(os.path.join(root, file), template_dir))

# Sort files alphabetically
matching_files.sort()

# Read existing README file
readme_path = 'README.md'
with open(readme_path, 'r') as f:
    readme_content = f.read()

# Prepare new content to insert into README
new_content = "\n## Template Files\n\nHere are all the template files found in the repository:\n\n"
new_content += "| File Path | Description |\n"
new_content += "|-----------|-------------|\n"

for file in matching_files:
    new_content += f"| {file} | Description of {file} |\n"

# Insert new content into README
if "## Template Files" not in readme_content:
    readme_content += new_content
else:
    readme_content = re.sub(r'## Template Files\n[\s\S]+?(?=\n##|\Z)', '## Template Files\n\n' + new_content, readme_content)

# Write the updated README back to the file
with open(readme_path, 'w') as f:
    f.write(readme_content)

EOF

      # Commit changes to README if there were updates
      - name: Commit changes
        run: |
          git diff --exit-code README.md || (
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
            git add README.md
            git commit -m "chore: update README with template files 🤖"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Ensure changes are pushed back to the correct branch
      - name: Push changes
        run: |
          git pull origin $GITHUB_REF --rebase
          git push origin $GITHUB_REF
